apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drift-sentinel.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "drift-sentinel.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "drift-sentinel.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "drift-sentinel.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "drift-sentinel.serviceAccountName" . }}
      containers:
        - name: drift-sentinel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: DRIFT_SENTINEL_ADDRESS
              value: ":{{ .Values.service.targetPort }}"
            - name: DRIFT_SENTINEL_TLS_CERT_FILE
              value: {{ .Values.tls.certFile | quote }}
            - name: DRIFT_SENTINEL_TLS_KEY_FILE
              value: {{ .Values.tls.keyFile | quote }}
{{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
{{- end }}
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: {{ include "drift-sentinel.fullname" . }}-cert
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
